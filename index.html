<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:#0f172a;
  color:#fff;
  overflow-x:hidden;
}

/* HERO VIDEO */
.hero{
  position:relative;
  height:100vh;
  overflow:hidden;
}

.hero video{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-family:'Playfair Display',serif;
  font-size:60px;
  margin-bottom:10px;
}

.hero p{
  font-size:18px;
  opacity:.8;
}

.btn{
  margin-top:20px;
  padding:12px 30px;
  border-radius:30px;
  background:#fff;
  color:#000;
  text-decoration:none;
  font-weight:600;
  transition:.3s;
}
.btn:hover{background:#ddd}

/* SECTION */
.section{
  padding:80px 20px;
  text-align:center;
}

.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  margin-top:40px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:25px;
  border-radius:20px;
  width:280px;
  backdrop-filter:blur(10px);
}

/* COUNTDOWN */
.countdown{
  font-size:28px;
  margin-top:20px;
}

/* RSVP */
form{
  max-width:400px;
  margin:30px auto;
}

input,button{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

input{
  background:#1e293b;
  color:#fff;
}

button{
  background:#fff;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

/* FOOTER */
footer{
  padding:20px;
  opacity:.6;
}

/* MOBILE */
@media(max-width:768px){
  .hero h1{font-size:35px}
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <video autoplay muted loop playsinline>
    <source src="https://cdn.shopify.com/videos/c/o/v/63e0008219384a25ad7e0069c714892d.mp4" type="video/mp4">
  </video>

  <div class="overlay">
    <h1>You're Invited</h1>
    <p>Join our unforgettable event</p>
    <a href="#rsvp" class="btn">RSVP Now</a>
  </div>
</section>

<!-- EVENTS -->
<section class="section">
  <h2>Choose Your Event</h2>

  <div class="cards">
    <div class="card">
      <h3>💍 Wedding</h3>
      <p>Elegant romantic ceremony</p>
    </div>

    <div class="card">
      <h3>🎉 Birthday</h3>
      <p>Fun & celebration night</p>
    </div>

    <div class="card">
      <h3>🏢 Corporate</h3>
      <p>Professional networking</p>
    </div>
  </div>
</section>

<!-- COUNTDOWN -->
<section class="section">
  <h2>Event Countdown</h2>
  <div class="countdown" id="countdown"></div>
</section>

<!-- RSVP -->
<section class="section" id="rsvp">
  <h2>RSVP</h2>

  <form onsubmit="submitForm(event)">
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="Email Address" required>
    <button type="submit">Confirm Attendance</button>
  </form>

  <p id="successMsg" style="display:none;">✅ Thank you! You're invited 🎉</p>
</section>

<footer>
  © 2026 Luxury Invitation
</footer>

<script>
/* COUNTDOWN */
const date = new Date("August 20, 2026 18:00:00").getTime();

setInterval(()=>{
  const now = new Date().getTime();
  const diff = date - now;

  const d = Math.floor(diff/(1000*60*60*24));
  const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  const m = Math.floor((diff%(1000*60*60))/(1000*60));

  document.getElementById("countdown").innerHTML =
    d+"d "+h+"h "+m+"m";

},1000);

/* RSVP */
function submitForm(e){
  e.preventDefault();
  document.getElementById("successMsg").style.display="block";
}
</script>

</body>
</html>
